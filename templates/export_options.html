<div class="bg-white rounded-xl shadow-lg p-6 mb-6">
    <h2 class="text-xl font-semibold mb-4 text-indigo-600">Export Options</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Summary Length Selection -->
        <div>
            <label for="summaryLength" class="font-semibold mb-2 block">Summary Length</label>
            <select id="summaryLength" v-model="summaryLength" class="w-full p-2 border rounded-lg focus:ring focus:ring-indigo-300">
                <option value="brief">Brief</option>
                <option value="standard">Standard</option>
                <option value="detailed">Detailed</option>
            </select>
        </div>

        <!-- Export Format Buttons -->
        <div>
            <h3 class="font-semibold mb-2">Export Format</h3>
            <div class="flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-4">
                <button 
                    @click="exportSummary('pdf')" 
                    class="w-full md:w-auto px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 focus:ring focus:ring-indigo-300"
                    aria-label="Export Summary as PDF">
                    Export PDF
                </button>
                <button 
                    @click="exportSummary('csv')" 
                    class="w-full md:w-auto px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 focus:ring focus:ring-indigo-300"
                    aria-label="Export Summary as CSV">
                    Export CSV
                </button>
            </div>
        </div>
    </div>
</div>
